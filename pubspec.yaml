name: personality_dna
description: A comprehensive personality analysis app using MBTI, Big Five, DISC, and Enneagram models.
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.4.0
  firebase_analytics: ^10.7.0
  firebase_messaging: ^14.7.0
  
  # UI & Animation
  flutter_animate: ^4.2.0+1
  lottie: ^2.7.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.0
  
  # State Management
  provider: ^6.1.0
  riverpod: ^2.4.0
  hooks_riverpod: ^2.4.0
  flutter_hooks: ^0.20.3
  
  # Data & Serialization
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  
  # DateTime & Localization
  intl: ^0.19.0
  hijri: ^5.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # PDF & Export
  pdf: ^3.10.4
  printing: ^5.11.0
  path_provider: ^2.1.1
  
  # Share & Social
  share_plus: ^7.1.0
  url_launcher: ^6.2.1
  
  # Charts & Graphs
  fl_chart: ^0.65.0
  syncfusion_flutter_charts: ^23.1.36
  
  # Notifications
  awesome_notifications: ^0.7.4+1
  
  # Utility
  uuid: ^4.0.0
  http: ^1.1.0
  dio: ^5.3.1
  connectivity_plus: ^5.0.1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  
  # Themes & Design
  google_fonts: ^6.1.0
  flex_color_scheme: ^7.3.1
  animate_do: ^3.1.2
  shimmer: ^3.0.0
  
  # Math & Utils
  vector_math: ^2.1.4
  tuple: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
    - assets/data/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600